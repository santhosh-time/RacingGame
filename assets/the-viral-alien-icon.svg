<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">The Viral Alien icon</title>
  <desc id="desc">A playful alien face with an orbit ring, designed as a scalable vector icon.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="208" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1B1540"/>
      <stop offset="1" stop-color="#102A5C"/>
    </linearGradient>
    <linearGradient id="ring" x1="46" y1="138" x2="211" y2="138" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6FFFE9"/>
      <stop offset="1" stop-color="#79F25E"/>
    </linearGradient>
    <linearGradient id="head" x1="84" y1="66" x2="175" y2="183" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8EDBFF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#081128" flood-opacity=".28"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="98" fill="url(#bg)"/>
  </g>

  <ellipse
    cx="128"
    cy="154"
    rx="82"
    ry="23"
    fill="none"
    stroke="url(#ring)"
    stroke-width="14"
    stroke-linecap="round"
    transform="rotate(-12 128 154)"
  />

  <path d="M102 71 89 49" fill="none" stroke="#8EDBFF" stroke-width="10" stroke-linecap="round"/>
  <path d="M154 71 167 49" fill="none" stroke="#8EDBFF" stroke-width="10" stroke-linecap="round"/>
  <circle cx="87" cy="46" r="11" fill="#FF6B8A"/>
  <circle cx="169" cy="46" r="11" fill="#FFB84D"/>

  <path
    d="M128 62c-34 0-62 25-62 56 0 24 16 45 39 53l-3 19 19-11c2 0 4 1 7 1 34 0 62-25 62-56s-28-62-62-62Z"
    fill="url(#head)"
    stroke="#132445"
    stroke-width="8"
    stroke-linejoin="round"
  />

  <ellipse cx="105" cy="118" rx="15" ry="23" fill="#132445"/>
  <ellipse cx="151" cy="118" rx="15" ry="23" fill="#132445"/>
  <circle cx="110" cy="110" r="5" fill="#FFFFFF" opacity=".9"/>
  <circle cx="156" cy="110" r="5" fill="#FFFFFF" opacity=".9"/>

  <path d="M108 145c11 12 29 12 40 0" fill="none" stroke="#132445" stroke-width="8" stroke-linecap="round"/>

  <circle cx="59" cy="89" r="8" fill="#FF6B8A"/>
  <circle cx="194" cy="187" r="7" fill="#6FFFE9"/>
  <circle cx="205" cy="88" r="5" fill="#FFD45A"/>
</svg>
